name: Pump Monitor — Momentum (5m)
# Mode: WATCH hunter agresif + Sniper path
# Target: deteksi pre-pump dan early entry
# v2 — 04/05/2026: perketat threshold NORMAL signal (WR 6% dari 7 sampel)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: dummy_token_for_test
          TELEGRAM_CHAT_ID:   dummy_chat_for_test
        run: pytest indodax_pump_monitor.py --tb=short -q

  scan:
    name: Scan Momentum Signals
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pump monitor (momentum — WATCH hunter + Sniper)
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          STATE_FILE:            price_state_momentum.json

          # ── Tier & score filter
          SCORE_THRESHOLD:       "7"    # naik dari 5 → 7 (NORMAL WR 6%, harus lebih ketat)
          TIER_MIN_SEND:         "B"    # naikkan ke A setelah WR ≥ 40%

          # ── Signal thresholds (diperketat — NORMAL WR 6% dari 7 sampel)
          PRICE_PUMP_PCT:        "2.5"  # naik dari 1.5 → pump harus lebih nyata
          VOL_SPIKE_MULT:        "3.0"  # naik dari 2.0 → volume harus kuat
          BREAKOUT_PCT:          "1.5"  # naik dari 1.0 → breakout lebih meyakinkan
          SNIPER_PUMP_PCT:       "0.8"  # tetap — sniper path tidak bermasalah
          SNIPER_VOL_MULT:       "1.5"  # tetap

          # ── Entry & risk
          ENTRY_DISCOUNT_PCT:    "0.5"
          SL_PCT:                "5.0"

          # ── WATCH detection (tetap agresif — WATCH tidak bermasalah)
          WATCH_PRICE_FLAT_PCT:  "3.0"
          WATCH_VOL_BUILD_MIN:   "1.5"
          WATCH_VOL_BUILD_MAX:   "4.9"
          WATCH_MIN_SNAPS:       "3"
          MAX_WATCH_PER_RUN:     "5"

          # ── Early signal (sedikit diperketat)
          EARLY_BREAKOUT_PCT:    "1.5"  # naik dari 1.0 → Early juga harus lebih kuat
          WATCH_EXPIRE_MINUTES:  "20"
          EARLY_SL_PCT:          "2.5"

          # ── Market filter
          BTC_DROP_THRESHOLD:    "-3.0"
          EXTREME_PUMP_BYPASS_PCT: "10.0"

          # ── Portfolio
          MAX_SIGNALS_PER_RUN:   "3"    # turun dari 5 → 3, kurangi eksposur saat WR rendah
          MAX_OPEN_TRADES:       "15"
          MAX_PORTFOLIO_HEAT:    "30"

          # ── Rate-limit guard (v5.5)
          TRADE_PRESSURE_SLEEP_SEC: "0.05"
        run: python indodax_pump_monitor.py

      - name: Commit & push state file
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_state_momentum.json
          git diff --cached --quiet || git commit -m "chore: update state [momentum] [skip ci]"
          git push
