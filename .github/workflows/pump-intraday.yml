name: Pump Monitor — Intraday (1h)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scan:
    name: Scan Pump Signals (Intraday)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pump monitor (intraday — threshold lebih ketat)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          STATE_FILE:          price_state_intraday.json
          MAX_SNAPSHOTS:       "30"
          MIN_SNAPS_SIGNAL:    "3"
          PRICE_PUMP_PCT:      "5.0"
          VOL_SPIKE_MULT:      "7.0"
          RSI_OVERSOLD:        "30.0"
          RSI_RECOVERY:        "55.0"
          MAX_SIGNALS_PER_RUN: "3"
        run: python indodax_pump_monitor.py

      - name: Commit & push state file
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_state_intraday.json
          git diff --cached --quiet || git commit -m "chore: update price state [intraday] [skip ci]"
          git push
