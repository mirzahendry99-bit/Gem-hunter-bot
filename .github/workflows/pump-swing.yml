name: Pump Monitor — Swing (1h)
# Mode: konfirmasi selektif — sinyal berkualitas tinggi, entry lebih aman

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: dummy_token_for_test
          TELEGRAM_CHAT_ID:   dummy_chat_for_test
        run: pytest indodax_pump_monitor.py --tb=short -q

  scan:
    name: Scan Swing Signals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pump monitor (swing — selektif)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          STATE_FILE:         price_state_swing.json

          # ── Threshold sinyal pump (ketat)
          PRICE_PUMP_PCT:     "5.0"    # pump minimal 5%
          VOL_SPIKE_MULT:     "7.0"    # vol spike 7×
          RSI_OVERSOLD:       "30.0"   # oversold lebih dalam
          RSI_RECOVERY:       "55.0"   # recovery lebih tinggi

          # ── WATCH: selektif — hanya akumulasi yang kuat
          WATCH_PRICE_FLAT_PCT:  "2.0"   # flat ketat ≤2%
          WATCH_VOL_BUILD_MIN:   "2.5"   # butuh 2.5× untuk masuk watch
          WATCH_VOL_BUILD_MAX:   "6.0"   # batas lebih tinggi
          WATCH_MIN_SNAPS:       "5"     # butuh 5 snapshot
          MAX_WATCH_PER_RUN:     "2"     # hanya 2 WATCH terbaik

          # ── Early Signal: lebih konservatif
          EARLY_BREAKOUT_PCT:    "2.0"   # breakout 2% dari baseline
          WATCH_EXPIRE_MINUTES:  "45"    # WATCH valid lebih lama (45 mnt)
          EARLY_SL_PCT:          "3.5"   # SL sedikit lebih longgar

          # ── Portfolio
          MAX_SIGNALS_PER_RUN:   "2"     # maksimal 2 sinyal per jam
          MAX_OPEN_TRADES:       "8"     # lebih selektif

          # ── BTC trend — ketat
          BTC_DROP_THRESHOLD:    "-1.5"  # blokir jika BTC turun 1.5%+
        run: python indodax_pump_monitor.py

      - name: Commit & push state file
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_state_swing.json
          git diff --cached --quiet || git commit -m "chore: update state [swing] [skip ci]"
          git push
