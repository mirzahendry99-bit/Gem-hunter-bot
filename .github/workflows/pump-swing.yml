name: Pump Monitor — Swing (1h)
# Mode: konfirmasi lebih selektif, sinyal berkualitas tinggi

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: dummy_token_for_test
          TELEGRAM_CHAT_ID:   dummy_chat_for_test
        run: pytest indodax_pump_monitor.py --tb=short -q

  scan:
    name: Scan Swing Signals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pump monitor (swing — selektif)
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          STATE_FILE:            price_state_swing.json

          # ── Tier & score filter  ← FIX: sebelumnya tidak ada, default terlalu longgar
          SCORE_THRESHOLD:       "7"    # swing lebih ketat dari momentum
          TIER_MIN_SEND:         "B"    # tetap B dulu, naikkan ke A setelah WR ≥ 40%

          # ── Signal thresholds (swing lebih ketat dari momentum)
          PRICE_PUMP_PCT:        "2.0"
          VOL_SPIKE_MULT:        "3.0"
          BREAKOUT_PCT:          "1.0"
          SNIPER_PUMP_PCT:       "1.0"
          SNIPER_VOL_MULT:       "2.0"

          # ── Entry & risk
          ENTRY_DISCOUNT_PCT:    "0.5"
          SL_PCT:                "5.0"

          # ── WATCH detection (lebih selektif)
          WATCH_PRICE_FLAT_PCT:  "2.0"
          WATCH_VOL_BUILD_MIN:   "2.0"
          WATCH_VOL_BUILD_MAX:   "5.0"
          WATCH_MIN_SNAPS:       "5"
          MAX_WATCH_PER_RUN:     "3"

          # ── Early signal
          EARLY_BREAKOUT_PCT:    "1.5"
          WATCH_EXPIRE_MINUTES:  "45"
          EARLY_SL_PCT:          "3.0"

          # ── Market filter (swing lebih ketat)
          BTC_DROP_THRESHOLD:    "-2.0"
          EXTREME_PUMP_BYPASS_PCT: "10.0"

          # ── Portfolio
          MAX_SIGNALS_PER_RUN:   "2"
          MAX_OPEN_TRADES:       "8"
          MAX_PORTFOLIO_HEAT:    "20"

          # ── Rate-limit guard (v5.5)
          TRADE_PRESSURE_SLEEP_SEC: "0.05"
        run: python indodax_pump_monitor.py

      - name: Commit & push state file
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_state_swing.json
          git diff --cached --quiet || git commit -m "chore: update state [swing] [skip ci]"
          git push
