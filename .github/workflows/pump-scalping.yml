name: Pump Monitor — Scalping (5m)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: dummy_token_for_test
          TELEGRAM_CHAT_ID:   dummy_chat_for_test
        run: pytest indodax_pump_monitor.py --tb=short -q

  scan:
    name: Scan Pump Signals
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: test          # scan hanya jalan jika tests pass
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pump monitor (scalping)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          STATE_FILE:          price_state_scalping.json
          MAX_SNAPSHOTS:       "30"
          MIN_SNAPS_SIGNAL:    "3"
        run: python indodax_pump_monitor.py
      - name: Commit & push state file
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_state_scalping.json
          git diff --cached --quiet || git commit -m "chore: update price state [scalping] [skip ci]"
          git push
